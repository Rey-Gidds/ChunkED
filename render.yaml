services:
  - type: web
    name: chunked
    env: node
    plan: free
    buildCommand: "cd next-frontend && npm install && npm run build && cd .. && pip install -r requirements.txt && ls -R next-frontend/out"
    startCommand: "python agent/main.py"
    envVars:
      - key: PORT
        value: 10000
      - key: NODE_VERSION
        value: 20.0.0
      - key: PYTHON_VERSION
        value: 3.10.0
