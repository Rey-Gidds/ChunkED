services:
  - type: web
    name: chunked
    env: node
    plan: free
    buildCommand: |
      # Build the frontend
      cd next-frontend
      npm install
      npm run build
      cd ..
      # Install backend dependencies
      pip install -r requirements.txt
    startCommand: python agent/main.py
    envVars:
      - key: PORT
        value: 10000
      - key: NODE_VERSION
        value: 20.0.0
      - key: PYTHON_VERSION
        value: 3.10.0
